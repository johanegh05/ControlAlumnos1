<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Alumnos</title>
    <style>
        /* (Tus estilos se mantienen iguales, omitidos por brevedad para enfocar en el JS) */
        body { font-family: 'Segoe UI', sans-serif; margin: 15px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .section { margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .user-panel { text-align: center; background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="loginContainer" class="container" style="max-width: 400px; margin-top: 50px;">
        <h1>Identificación de Club</h1>
        <div class="input-group">
            <input type="text" id="loginNombre" placeholder="Tu Nombre">
            <input type="text" id="loginApellido" placeholder="Tu Apellido">
            <input type="text" id="loginClub" placeholder="Nombre del Club">
            <button onclick="iniciarSesion()">Registrar y Entrar</button>
        </div>
        <hr>
        <div class="input-group">
            <input type="text" id="loginId" placeholder="Ej. POLA-JG">
            <button onclick="iniciarSesionConId()" style="background-color: #3498db;">Entrar con mi ID</button>
        </div>
    </div>

    <div id="appContainer" style="display: none;">
        <div class="container">
            <div class="user-panel">
                <strong id="displayUserName">Usuario</strong><br>
                <small id="displayClubName">Club</small><br>
                <small id="displayUserId">ID: </small>
                <button onclick="cerrarSesion()" style="background:#e74c3c; padding:5px; margin-top:10px;">Cerrar Sesión</button>
            </div>
            <div class="tabs">
                <button id="btnTabAlumnos" class="active" onclick="switchTab('alumnos')">Alumnos</button>
                <button id="btnTabEventos" onclick="switchTab('eventos')">Eventos</button>
            </div>

            <div id="tabAlumnos" class="tab-content active">
                <div class="section">
                    <h2>Nueva Clase</h2>
                    <div class="input-group">
                        <input type="text" id="className" placeholder="Nombre clase">
                        <button onclick="addClass()">Agregar</button>
                    </div>
                </div>
                <div class="section">
                    <h2>Nuevo Alumno</h2>
                    <div class="input-group">
                        <input type="text" id="studentName" placeholder="Nombre">
                        <select id="classSelect"></select>
                        <button onclick="addStudent()">Registrar</button>
                    </div>
                </div>
                <table id="studentsTable">
                    <thead><tr><th>Nombre</th><th>Clase</th><th>Asist.</th><th>Pts</th><th>Acciones</th></tr></thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>

            <div id="tabEventos" class="tab-content">
                <div class="section">
                    <h2>Nuevo Evento</h2>
                    <div class="input-group">
                        <input type="text" id="eventName" placeholder="Nombre evento">
                        <button onclick="addEvent()">Guardar</button>
                    </div>
                </div>
                <select id="eventSelect" onchange="renderEventTable()"></select>
                <div id="eventDetails" style="display:none;">
                    <h3 id="totalEventMoney">Total: $0.00</h3>
                    <table id="eventTable">
                        <thead><tr><th>Alumno</th><th>Abonado</th><th>¿Va?</th><th>Pago</th></tr></thead>
                        <tbody id="eventTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api-alumnos-backend.onrender.com'; // Sin el /api al final
        let sessionData = JSON.parse(localStorage.getItem('appControlAlumnos_session'));
        let db = { classes: [], students: [], events: [] };

        async function checkSession() {
            if (sessionData && sessionData.id_unico) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('displayUserName').innerText = `👤 ${sessionData.nombre} ${sessionData.apellido}`;
                document.getElementById('displayClubName').innerText = `🛡️ Club: ${sessionData.club}`;
                document.getElementById('displayUserId').innerText = `ID: ${sessionData.id_unico}`;

                try {
                    const response = await fetch(`${API_URL}/api/data/${sessionData.id_unico}`);
                    if (response.ok) {
                        db = await response.json();
                        updateDropdowns(); renderTable(); updateEventDropdown();
                    }
                } catch (e) { console.error("Error cargando datos", e); }
            } else {
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('appContainer').style.display = 'none';
            }
        }

        async function iniciarSesion() {
            const nombre = document.getElementById('loginNombre').value.trim();
            const apellido = document.getElementById('loginApellido').value.trim();
            const club = document.getElementById('loginClub').value.trim();
            if (nombre && apellido && club) {
                const idGenerado = `${club.substring(0,4).toUpperCase()}-${(nombre.charAt(0)+apellido.charAt(0)).toUpperCase()}`;
                try {
                    const res = await fetch(`${API_URL}/api/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre, apellido, club, id_unico: idGenerado })
                    });
                    const data = await res.json();
                    if (data.status === "success") {
                        sessionData = data.user_data;
                        localStorage.setItem('appControlAlumnos_session', JSON.stringify(sessionData));
                        checkSession();
                    }
                } catch (e) { alert("Error de conexión"); }
            }
        }

        async function iniciarSesionConId() {
            const id = document.getElementById('loginId').value.trim().toUpperCase();
            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_unico: id })
                });
                const data = await res.json();
                if (data.status === "success") {
                    sessionData = data.user_data;
                    localStorage.setItem('appControlAlumnos_session', JSON.stringify(sessionData));
                    checkSession();
                } else { alert("ID no encontrado"); }
            } catch (e) { alert("Error de conexión"); }
        }

        async function saveData() {
            if (!sessionData) return;
            try {
                await fetch(`${API_URL}/api/data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_club: sessionData.id_unico, db: db })
                });
            } catch (e) { console.error("Error al guardar", e); }
        }

        // Lógica de UI (Simplificada para el ejemplo)
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        }

        function addClass() {
            const n = document.getElementById('className').value;
            if(n) { db.classes.push(n); updateDropdowns(); saveData(); }
        }

        function updateDropdowns() {
            const s = document.getElementById('classSelect');
            s.innerHTML = db.classes.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function addStudent() {
            const n = document.getElementById('studentName').value;
            const c = document.getElementById('classSelect').value;
            if(n && c) {
                db.students.push({id: Date.now(), name: n, class: c, attendance: 0, participation: 0});
                renderTable(); saveData();
            }
        }

        function renderTable() {
            const b = document.getElementById('studentTableBody');
            b.innerHTML = db.students.map(s => `<tr><td>${s.name}</td><td>${s.class}</td><td>${s.attendance}</td><td>${s.participation}</td><td><button onclick="upd(${s.id},'attendance',1)">+Asist</button></td></tr>`).join('');
        }

        function upd(id, field, val) {
            const s = db.students.find(x => x.id === id);
            if(s) { s[field] += val; renderTable(); saveData(); }
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }

        checkSession();
    </script>
</body>
</html>
